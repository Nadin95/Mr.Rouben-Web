# ─── Mr. Rouben — Nginx config para producción ───────────────────────────────
#
# Ubicación en el servidor: /etc/nginx/sites-available/mrrouben.com
# Activar con: sudo ln -s /etc/nginx/sites-available/mrrouben.com /etc/nginx/sites-enabled/
# Después de editar: sudo nginx -t && sudo systemctl reload nginx
#
# SSL con Let's Encrypt: sudo certbot --nginx -d mrrouben.com -d www.mrrouben.com

server {
    listen 80;
    server_name mrrouben.com www.mrrouben.com;

    # Redirigir todo HTTP → HTTPS (Certbot lo rellena automáticamente)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mrrouben.com www.mrrouben.com;

    # ── SSL (Certbot rellena estas rutas automáticamente) ─────────────────────
    ssl_certificate     /etc/letsencrypt/live/mrrouben.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mrrouben.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Seguridad extra ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Archivos estáticos servidos por Nginx (sin tocar Node) ───────────────
    location /uploads/ {
        alias /home/Andres/Documentos/Proyecto\ Mr.Rouben/src/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(css|js|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|webp|gif)$ {
        root /home/Andres/Documentos/Proyecto\ Mr.Rouben/src/public;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Health check (sin logs de acceso para no saturar) ────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }

    # ── Todo lo demás → Node.js / pm2 ────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        client_max_body_size 10M;   # límite para uploads de comprobantes
    }
}
